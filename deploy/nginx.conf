map $uri $yumcut_cache_control {
  default "no-cache";
  "/nextjs/vendor/yumcut-render-worker.js" "no-cache, no-store, must-revalidate";
  ~^/(?:nextjs|react|vanilla)/(?:_next/static|assets)/ "public, max-age=31536000, immutable";
  ~^/(?:nextjs|react|vanilla)/media/ "public, max-age=3600, must-revalidate";
  ~^/media/ "public, max-age=3600, must-revalidate";
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  server_tokens off;
  # Coolify terminates TLS at its reverse proxy. Relative redirects avoid leaking
  # this container's internal scheme or port in Location headers.
  absolute_redirect off;
  port_in_redirect off;
  etag on;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  add_header Cache-Control $yumcut_cache_control always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; media-src 'self' https: blob: data:; connect-src 'self' https: blob:; worker-src 'self' blob:; child-src 'self' blob:" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /nextjs { return 308 /nextjs/; }
  location = /react { return 308 /react/; }
  location = /vanilla { return 308 /vanilla/; }
  location = /media { return 308 /media/; }

  # Asset namespaces must return a real 404. Falling back to HTML here would make
  # browsers report misleading MIME errors for missing scripts, workers, or media.
  location ^~ /nextjs/_next/ { try_files $uri =404; }
  location ^~ /nextjs/media/ { try_files $uri =404; }
  location ^~ /nextjs/vendor/ { try_files $uri =404; }
  location ^~ /react/assets/ { try_files $uri =404; }
  location ^~ /react/media/ { try_files $uri =404; }
  location ^~ /vanilla/assets/ { try_files $uri =404; }
  location ^~ /vanilla/media/ { try_files $uri =404; }
  location ^~ /media/ { try_files $uri $uri/ =404; }

  location /nextjs/ { try_files $uri $uri/ /nextjs/index.html; }
  location /react/ { try_files $uri $uri/ /react/index.html; }
  location /vanilla/ { try_files $uri $uri/ /vanilla/index.html; }
  location / { try_files $uri $uri/ =404; }
}
